<!DOCTYPE html>
<html lang="en">
<head>

<body class="bg-[#4C1D95] text-white">

                <textarea placeholder="Tell us about your project..." rows="6" class="w-full bg-white/10 border border-white/30 rounded-2xl px-6 py-5" required></textarea>
                <button type="submit" class="w-full py-6 bg-gradient-to-r from-[#60A5FA] to-white text-[#1E3A8A] font-semibold rounded-2xl">SEND MESSAGE</button>

            <div>

                <a href="mailto:abdulshakurwahab71@gmail.com" class="text-xl hover:underline">abdulshakurwahab71@gmail.com</a>
            </div>
            <div>
                <p class="text-[#60A5FA]">📞 Phone</p>
                <a href="tel:0747190805" class="block text-2xl hover:text-[#60A5FA]">0747 190 805</a>
                <a href="tel:0750850850" class="block text-2xl hover:text-[#60A5FA]">0750 850 850</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            alert("✅ Thank you! Your message has been received. We will reply soon.");
        });
    </script>
</body>
